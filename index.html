<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>採取量計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #eef1f5;
    padding: 20px;
    margin: 0;
}

.app-card {
    background: #ffffff;
    padding: 22px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    max-width: 600px;
    margin: auto;
    display: none;
}

h2 {
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 24px;
}

.menu-item {
    background: #ffffff;
    border-radius: 18px;
    padding: 20px;
    margin: 16px 0;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    cursor: pointer;
}

.menu-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: linear-gradient(135deg, #4CAF50, #2e8b3f);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 32px;
    margin-right: 18px;
}

.menu-text {
    font-size: 22px;
    font-weight: bold;
}

label {
    font-size: 20px;
    font-weight: bold;
    margin-top: 18px;
    display: block;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    font-size: 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #fafafa;
    box-sizing: border-box;
}

button.calc-btn {
    width: 100%;
    padding: 16px;
    font-size: 22px;
    margin-top: 26px;
    background: linear-gradient(135deg, #4CAF50, #2e8b3f);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: bold;
}

.back-btn {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    font-size: 20px;
    background: #888;
    color: white;
    border: none;
    border-radius: 10px;
}

.result {
    margin-top: 28px;
    font-size: 26px;
    font-weight: bold;
    text-align: center;
}

.formula-card {
    margin-top: 30px;
    background: #ffffff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-left: 6px solid #000000;
}

.formula-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 12px;
}

.formula-math {
    font-family: "SF Mono", Consolas, monospace;
    font-size: 17px;
    line-height: 1.6;
    text-align: center;
}

.fraction {
    display: inline-block;
    width: 100%;
    text-align: center;
    margin: 10px 0;
}

.fraction .top {
    display: block;
    padding-bottom: 6px;
    border-bottom: 2px solid #000;
}

.fraction .bottom {
    display: block;
    padding-top: 6px;
}

table {
    width: 100%;
    font-size: 18px;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 8px;
}

th {
    text-align: left;
    border-bottom: 2px solid #ccc;
}

td {
    border-bottom: 1px solid #eee;
}
</style>
</head>
<body>

<!-- ▼ ホーム -->
<div id="menu" class="app-card" style="display:block;">
    <h2>採取量計算ツール</h2>

    <div class="menu-item" onclick="showTool('gas')">
        <div class="menu-icon">💨</div>
        <div class="menu-text">気体ガス採取量</div>
    </div>

    <div class="menu-item" onclick="showTool('liquid')">
        <div class="menu-icon">💧</div>
        <div class="menu-text">薬液採取量</div>
    </div>

    <div class="menu-item" onclick="showTool('sih4')">
        <div class="menu-icon">🧴</div>
        <div class="menu-text">SiH4採取圧力目安</div>
    </div>

    <div class="menu-item" onclick="showTool('ph3')">
        <div class="menu-icon">☣️</div>
        <div class="menu-text">PH₃採取圧力目安</div>
    </div>

    <div class="menu-item" onclick="showTool('ampule')">
        <div class="menu-icon">🧪</div>
        <div class="menu-text">アンプル希釈量</div>
    </div>

    <div class="menu-item" onclick="showTool('lel')">
        <div class="menu-icon">🔥</div>
        <div class="menu-text">可燃性ガス LEL 一覧</div>
    </div>
</div>
<!-- ▼ PH3 -->
<div id="ph3" class="app-card">
    <h2>PH₃採取圧力目安</h2>

    <label>ガス作製量（L）</label>
    <input type="number" id="ph3_makeVolume">

    <label>作製するPH₃濃度（ppm）</label>
    <input type="number" id="ph3_makePPM">

    <label>PH₃缶濃度（ppm）</label>
    <input type="number" id="ph3_cylinderPPM">

    <button class="calc-btn" onclick="calcPH3()">計算する</button>

    <div class="result" id="ph3Result"></div>

    <div class="formula-card">
        <div class="formula-title">PH₃採取量計算式</div>
        <div class="formula-math">
            <div class="fraction">
                <span class="top">ガス作製量 × 作製濃度</span>
                <span class="bottom">缶濃度 − 作製濃度</span>
            </div>
            × 1000 = 採取量(mL)
        </div>
    </div>

    <div class="formula-card">
        <div class="formula-title">PH₃圧力目安計算式</div>
        <div class="formula-math">
            <div class="fraction">
                <span class="top">採取量(mL)</span>
                <span class="bottom">1000</span>
            </div>
            × 0.17 = 圧力(MPa)
        </div>
    </div>

    <button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>
    <script>
function showTool(id) {
    menu.style.display = "none";
    gas.style.display = "none";
    liquid.style.display = "none";
    lel.style.display = "none";
    sih4.style.display = "none";
    ampule.style.display = "none";
    ph3.style.display = "none";
    document.getElementById(id).style.display = "block";
}

function backMenu() {
    menu.style.display = "block";
    gas.style.display = "none";
    liquid.style.display = "none";
    lel.style.display = "none";
    sih4.style.display = "none";
    ampule.style.display = "none";
    ph3.style.display = "none";
}

/* ▼ 気体ガス採取量 */
function calcGas() {
    const v = parseFloat(makeVolume.value);
    const ppm = parseFloat(makePPM.value);
    const cyl = parseFloat(cylinderPPM.value);

    if (v <= 0 || ppm <= 0 || cyl <= 0)
        return gasResult.innerHTML = "入力値が不正です。";

    const denom = cyl - ppm;
    if (denom <= 0)
        return gasResult.innerHTML = "分母が 0 以下です。";

    const result = (v * ppm / denom) * 1000;
    gasResult.innerHTML = "採取量：" + result.toFixed(2) + " mL";
}

/* ▼ 薬液採取量 */
function calcLiquid() {
    const t = parseFloat(roomTemp.value);
    const v = parseFloat(gasVolume.value);
    const mw = parseFloat(molWeight.value);
    const ppm = parseFloat(makePPM2.value);
    const d = parseFloat(density.value);

    if (t < 0 || v <= 0 || mw <= 0 || ppm <= 0 || d <= 0)
        return liquidResult.innerHTML = "入力値が不正です。";

    const tempFactor = 273 / (273 + t);
    const result = tempFactor * (v * mw * ppm) / (22.4 * 1000 * d);

    liquidResult.innerHTML = "採取量：" + result.toFixed(2) + " μL";
}

/* ▼ SiH4 */
function calcSiH4() {
    const v = parseFloat(sih4_makeVolume.value);
    const ppm = parseFloat(sih4_makePPM.value);
    const cyl = parseFloat(sih4_cylinderPPM.value);

    if (v <= 0 || ppm <= 0 || cyl <= 0)
        return sih4Result.innerHTML = "入力値が不正です。";

    const denom = cyl - ppm;
    if (denom <= 0)
        return sih4Result.innerHTML = "分母が 0 以下です。";

    const take_ml = (v * ppm / denom) * 1000;
    const pressure = (take_ml / 1000) * 0.175;

    sih4Result.innerHTML =
        "SiH4採取量：" + take_ml.toFixed(2) + " mL<br>" +
        "圧力目安：" + pressure.toFixed(3) + " MPa";
}

/* ▼ PH3（新規追加） */
function calcPH3() {
    const v = parseFloat(ph3_makeVolume.value);
    const ppm = parseFloat(ph3_makePPM.value);
    const cyl = parseFloat(ph3_cylinderPPM.value);

    if (v <= 0 || ppm <= 0 || cyl <= 0)
        return ph3Result.innerHTML = "入力値が不正です。";

    const denom = cyl - ppm;
    if (denom <= 0)
        return ph3Result.innerHTML = "分母が 0 以下です。";

    const take_ml = (v * ppm / denom) * 1000;

    /* 表から導いた係数：0.17 MPa/L */
    const pressure = (take_ml / 1000) * 0.17;

    ph3Result.innerHTML =
        "PH₃採取量：" + take_ml.toFixed(2) + " mL<br>" +
        "圧力目安：" + pressure.toFixed(3) + " MPa";
}

/* ▼ アンプル希釈量 */
function calcAmpule() {
    const cc = parseFloat(amp_cc.value);
    const ppm = parseFloat(amp_ppm.value);

    if (cc <= 0 || ppm <= 0)
        return ampResult.innerHTML = "入力値が不正です。";

    const result = (cc * 1000) / ppm;

    ampResult.innerHTML =
        "ガス作製希釈量：" + result.toFixed(2) + " L";
}

/* ▼ Service Worker */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
            .catch(err => console.log('SW registration failed:', err));
    });
}
</script>
</body>
</html>

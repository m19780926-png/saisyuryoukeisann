<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>気体ガス採取量計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Arial;
        padding: 16px;
        font-size: 20px;
        line-height: 1.6;
    }

    label {
        font-size: 22px;
        font-weight: bold;
        margin-top: 18px;
        display: block;
    }

    input {
        width: 100%;
        padding: 14px;
        margin-top: 6px;
        font-size: 22px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 16px;
        font-size: 24px;
        margin-top: 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 10px;
    }

    .result {
        margin-top: 24px;
        font-size: 26px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h2 style="font-size:28px;">気体ガス採取量 計算ツール</h2>

<label>希釈ガス作製量（L）</label>
<input type="number" id="makeVolume" step="0.01">

<label>作製濃度（ppm）</label>
<input type="number" id="makePPM" step="0.01">

<label>ボンベガス濃度（ppm）</label>
<input type="number" id="cylinderPPM" step="0.01">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

<script>
function calc() {
    const makeVolume = parseFloat(document.getElementById("makeVolume").value);
    const makePPM = parseFloat(document.getElementById("makePPM").value);
    const cylinderPPM = parseFloat(document.getElementById("cylinderPPM").value);

    if (makeVolume <= 0 || makePPM <= 0 || cylinderPPM <= 0) {
        document.getElementById("result").innerHTML = "入力値が不正です。";
        return;
    }

    const denom = cylinderPPM - makePPM;
    if (denom <= 0) {
        document.getElementById("result").innerHTML = "分母（ボンベ濃度 − 作製濃度）が 0 以下です。";
        return;
    }

    const result = (makeVolume * makePPM / denom) * 1000;

    document.getElementById("result").innerHTML =
        "採取量：" + result.toFixed(2) + " mL";
}
</script>

</body>
</html>

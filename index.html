<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>採取量計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;background:#eef1f5;padding:20px;margin:0;}
.app-card{background:#fff;padding:22px;border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);max-width:600px;margin:auto;display:none;}
h2{font-size:30px;font-weight:bold;text-align:center;margin-bottom:24px;}
.menu-item{background:#fff;border-radius:18px;padding:20px;margin:16px 0;display:flex;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,0.1);cursor:pointer;}
.menu-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#4CAF50,#2e8b3f);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;margin-right:18px;}
.menu-text{font-size:22px;font-weight:bold;}
label{font-size:20px;font-weight:bold;margin-top:18px;display:block;}
input{width:100%;padding:14px;margin-top:6px;font-size:20px;border-radius:10px;border:1px solid #ccc;background:#fafafa;box-sizing:border-box;}
button.calc-btn{width:100%;padding:16px;font-size:22px;margin-top:26px;background:linear-gradient(135deg,#4CAF50,#2e8b3f);color:#fff;border:none;border-radius:12px;font-weight:bold;}
.back-btn{margin-top:24px;width:100%;padding:14px;font-size:20px;background:#888;color:#fff;border:none;border-radius:10px;}
.result{margin-top:28px;font-size:26px;font-weight:bold;text-align:center;}
</style>
</head>
<body>

<!-- ▼ ホーム -->
<div id="menu" class="app-card" style="display:block;">
<h2>採取量計算ツール</h2>

<div class="menu-item" onclick="showTool('gas')"><div class="menu-icon">💨</div><div class="menu-text">気体ガス採取量</div></div>
<div class="menu-item" onclick="showTool('liquid')"><div class="menu-icon">💧</div><div class="menu-text">薬液採取量</div></div>
<div class="menu-item" onclick="showTool('sih4')"><div class="menu-icon">🧴</div><div class="menu-text">SiH4採取圧力目安</div></div>
<div class="menu-item" onclick="showTool('ph3')"><div class="menu-icon">☣️</div><div class="menu-text">PH₃採取圧力目安</div></div>
<div class="menu-item" onclick="showTool('ampule')"><div class="menu-icon">🧪</div><div class="menu-text">アンプル希釈量</div></div>
<div class="menu-item" onclick="showTool('lel')"><div class="menu-icon">🔥</div><div class="menu-text">可燃性ガス LEL 一覧</div></div>
</div>

<!-- ▼ PH3 -->
<div id="ph3" class="app-card">
<h2>PH₃採取圧力目安</h2>
<label>ガス作製量（L）</label><input type="number" id="ph3_makeVolume">
<label>作製するPH₃濃度（ppm）</label><input type="number" id="ph3_makePPM">
<label>PH₃缶濃度（ppm）</label><input type="number" id="ph3_cylinderPPM">
<button class="calc-btn" onclick="calcPH3()">計算する</button>
<div class="result" id="ph3Result"></div>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<!-- ▼ 気体 -->
<div id="gas" class="app-card">
<h2>気体ガス採取量</h2>
<label>希釈ガス作製量（L）</label><input type="number" id="makeVolume">
<label>作製濃度（ppm）</label><input type="number" id="makePPM">
<label>ボンベガス濃度（ppm）</label><input type="number" id="cylinderPPM">
<button class="calc-btn" onclick="calcGas()">計算する</button>
<div class="result" id="gasResult"></div>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<!-- ▼ 薬液 -->
<div id="liquid" class="app-card">
<h2>薬液採取量</h2>
<label>室温（℃）</label><input type="number" id="roomTemp">
<label>ガス作製量（L）</label><input type="number" id="gasVolume">
<label>薬液の分子量</label><input type="number" id="molWeight">
<label>作製濃度（ppm）</label><input type="number" id="makePPM2">
<label>薬液の比重</label><input type="number" id="density">
<button class="calc-btn" onclick="calcLiquid()">計算する</button>
<div class="result" id="liquidResult"></div>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<!-- ▼ SiH4 -->
<div id="sih4" class="app-card">
<h2>SiH4採取圧力目安</h2>
<label>ガス作製量（L）</label><input type="number" id="sih4_makeVolume">
<label>作製するSiH4濃度（ppm）</label><input type="number" id="sih4_makePPM">
<label>SiH4ボンベ濃度（ppm）</label><input type="number" id="sih4_cylinderPPM">
<button class="calc-btn" onclick="calcSiH4()">計算する</button>
<div class="result" id="sih4Result"></div>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<!-- ▼ アンプル -->
<div id="ampule" class="app-card">
<h2>アンプル希釈量</h2>
<label>アンプルガス封入量（cc）</label><input type="number" id="amp_cc">
<label>作りたいガス濃度（ppm）</label><input type="number" id="amp_ppm">
<button class="calc-btn" onclick="calcAmpule()">計算する</button>
<div class="result" id="ampResult"></div>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<!-- ▼ LEL -->
<div id="lel" class="app-card">
<h2>可燃性ガス LEL 一覧</h2>
<table>
<tr><th>ガス名</th><th>化学式</th><th>LEL(%)</th></tr>
<tr><td>水素</td><td>H2</td><td>4.0</td></tr>
<tr><td>メタン</td><td>CH4</td><td>5.0</td></tr>
<tr><td>プロパン</td><td>C3H8</td><td>2.1</td></tr>
<tr><td>ブタン</td><td>C4H10</td><td>1.8</td></tr>
<tr><td>アセチレン</td><td>C2H2</td><td>2.5</td></tr>
<tr><td>一酸化炭素</td><td>CO</td><td>12.5</td></tr>
<tr><td>エタノール蒸気</td><td>C2H5OH</td><td>3.3</td></tr>
<tr><td>硫化水素</td><td>H2S</td><td>4.3</td></tr>
<tr><td>エチレン</td><td>C2H4</td><td>2.7</td></tr>
<tr><td>アンモニア</td><td>NH3</td><td>15.0</td></tr>
</table>
<button class="back-btn" onclick="backMenu()">← ホームに戻る</button>
</div>

<script>
function showTool(id){
menu.style.display="none";gas.style.display="none";liquid.style.display="none";
lel.style.display="none";sih4.style.display="none";ampule.style.display="none";ph3.style.display="none";
document.getElementById(id).style.display="block";
}
function backMenu(){
menu.style.display="block";gas.style.display="none";liquid.style.display="none";
lel.style.display="none";sih4.style.display="none";ampule.style.display="none";ph3.style.display="none";
}

/* 気体 */
function calcGas(){
const v=parseFloat(makeVolume.value),ppm=parseFloat(makePPM.value),cyl=parseFloat(cylinderPPM.value);
if(v<=0||ppm<=0||cyl<=0)return gasResult.innerHTML="入力値が不正です。";
const d=cyl-ppm;if(d<=0)return gasResult.innerHTML="分母が 0 以下です。";
gasResult.innerHTML="採取量："+((v*ppm/d)*1000).toFixed(2)+" mL";
}

/* 薬液 */
function calcLiquid(){
const t=parseFloat(roomTemp.value),v=parseFloat(gasVolume.value),mw=parseFloat(molWeight.value),
ppm=parseFloat(makePPM2.value),d=parseFloat(density.value);
if(t<0||v<=0||mw<=0||ppm<=0||d<=0)return liquidResult.innerHTML="入力値が不正です。";
const r=273/(273+t)*(v*mw*ppm)/(22.4*1000*d);
liquidResult.innerHTML="採取量："+r.toFixed(2)+" μL";
}

/* SiH4 */
function calcSiH4(){
const v=parseFloat(sih4_makeVolume.value),ppm=parseFloat(sih4_makePPM.value),cyl=parseFloat(sih4_cylinderPPM.value);
if(v<=0||ppm<=0||cyl<=0)return sih4Result.innerHTML="入力値が不正です。";
const d=cyl-ppm;if(d<=0)return sih4Result.innerHTML="分母が 0 以下です。";
const take=(v*ppm/d)*1000,press=(take/1000)*0.175;
sih4Result.innerHTML="SiH4採取量："+take.toFixed(2)+" mL<br>圧力目安："+press.toFixed(3)+" MPa";
}

/* PH3 */
function calcPH3(){
const v=parseFloat(ph3_makeVolume.value),ppm=parseFloat(ph3_makePPM.value),cyl=parseFloat(ph3_cylinderPPM.value);
if(v<=0||ppm<=0||cyl<=0)return ph3Result.innerHTML="入力値が不正です。";
const d=cyl-ppm;if(d<=0)return ph3Result.innerHTML="分母が 0 以下です。";
const take=(v*ppm/d)*1000,press=(take/1000)*0.17;
ph3Result.innerHTML="PH₃採取量："+take.toFixed(2)+" mL<br>圧力目安："+press.toFixed(3)+" MPa";
}

/* アンプル */
function calcAmpule(){
const cc=parseFloat(amp_cc.value),ppm=parseFloat(amp_ppm.value);
if(cc<=0||ppm<=0)return ampResult.innerHTML="入力値が不正です。";
ampResult.innerHTML="ガス作製希釈量："+((cc*1000)/ppm).toFixed(2)+" L";
}

/* SW */
if('serviceWorker'in navigator){
window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js'));
}
</script>
</body>
</html>
